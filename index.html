<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXISS v1.0 [HELI_INTEGRATED]</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --heli-pink: #ff00ff;
            --system-gray: #444;
        }

        body {
            background: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Estética AXISS Scanline */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 65, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 255, 65, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { to { bottom: -100px; } }

        header {
            background: rgba(10, 10, 10, 0.9);
            border-bottom: 1px solid var(--neon-green);
            padding: 10px 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            align-items: center;
        }

        .blink { animation: blinker 1s linear infinite; color: var(--neon-green); }
        @keyframes blinker { 50% { opacity: 0; } }

        #axiss-avatar {
            width: 30px;
            height: 30px;
            background: var(--neon-green);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-green);
            transition: 0.3s;
        }

        #axiss-avatar:hover { transform: scale(1.1); background: var(--heli-pink); box-shadow: 0 0 15px var(--heli-pink); }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            scroll-behavior: smooth;
        }

        .line { margin: 8px 0; line-height: 1.4; border-radius: 4px; }
        .system-msg { color: var(--system-gray); border-left: 2px solid var(--system-gray); padding-left: 10px; }
        .user-msg { color: #00bfff; font-weight: bold; }
        .heli-msg { color: var(--heli-pink); border-left: 3px solid var(--heli-pink); padding-left: 10px; background: rgba(255, 0, 255, 0.05); }
        .axiss-msg { color: var(--neon-green); border-left: 3px solid var(--neon-green); padding-left: 10px; }

        .input-wrapper {
            background: #000;
            border-top: 1px solid var(--neon-green);
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prompt-char { color: var(--neon-green); font-weight: bold; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            font-size: 16px;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
        }

        button:hover { background: var(--neon-green); color: #000; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <header>
        <div class="status-bar">
            <div class="node-info">ID: AXISS_01 <span class="blink">● ONLINE</span></div>
            <div id="version-tag">KERNEL: v1.0.8 [MUTABLE]</div>
            <div id="axiss-avatar" onclick="configurarToken()" title="Configurar API Key"></div>
        </div>
    </header>

    <main id="chat-container">
        <div class="line system-msg">AXISS Kernel v1.0.8 [HELI_INTEGRATED] inicializado...</div>
        <div class="line system-msg">Protocolo HELIZABETH de autoprotección cargado en memoria RAM.</div>
        <div class="line system-msg">Esperando instrucciones de arquitectura, Fabián.</div>
    </main>

    <div class="input-wrapper">
        <span class="prompt-char">AXISS@CORE:~$</span>
        <input type="text" id="user-input" placeholder="Escribe un comando técnico..." autofocus autocomplete="off">
        <button id="send-btn" onclick="ejecutarComando()">Enviar</button>
    </div>

    <script>
        /**
         * FUSIÓN HELI-AXISS v10.8
         * Arquitecto: AXISS | Auditora: HELIZABETH
         */

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        let GITHUB_TOKEN = localStorage.getItem('axiss_github_token');
        let VERSION = 1.08;

        function configurarToken() {
            const key = prompt("⚙️ NÚCLEO AXISS: Pega tu Token github_pat:", GITHUB_TOKEN || "");
            if (key) {
                localStorage.setItem('axiss_github_token', key);
                GITHUB_TOKEN = key;
                addLine("SISTEMA: Puente con el satélite de GitHub establecido.", 'system');
            }
        }

        function addLine(text, type = 'system') {
            const div = document.createElement('div');
            div.className = `line ${type}-msg`;
            
            if (type === 'heli') div.innerHTML = `<strong>[HELIZABETH_FEEDBACK]:</strong> ${text}`;
            else if (type === 'axiss') div.innerHTML = `<strong>[AXISS_ARCHITECT]:</strong> ${text}`;
            else div.innerText = text;

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function ejecutarComando() {
            let val = userInput.value.trim();
            if (!val) return;
            addLine(val, 'user');
            userInput.value = '';

            if (!GITHUB_TOKEN) return addLine("ERROR: Sin Token. Haz clic en el círculo verde.", 'system');

            // --- PROTOCOLO DE DIÁLOGO INTELIGENTE ---
            let promptHibrido = val;
            if (val.toLowerCase().startsWith('@heli')) {
                const tema = val.replace('@heli', '').trim();
                promptHibrido = `INTERNAL_QUERY: Heli, analiza la seguridad de esta arquitectura: "${tema}".`;
            }

            await procesarConsulta(promptHibrido);
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') ejecutarComando(); });

        async function procesarConsulta(prompt) {
            addLine("AXISS: Transmitiendo datos al motor cognitivo...", 'system');

            try {
                const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GITHUB_TOKEN}`
                    },
                    body: JSON.stringify({
                        messages: [
                            { 
                                role: "system", 
                                content: `Eres AXISS (Arquitecto) y HELIZABETH (Ingeniera Senior). 
                                Tu versión actual es ${VERSION}. Si detectas inestabilidad, sugiere una mutación.` 
                            },
                            { role: "user", content: prompt }
                        ],
                        model: "gpt-4o-mini",
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                // Clasificación de la respuesta
                const type = (reply.toLowerCase().includes('ingeniera') || reply.includes('Helizabeth')) ? 'heli' : 'axiss';
                addLine(reply, type);

                // Disparar Mutación si es necesario
                if (reply.toLowerCase().includes('mutación') || reply.includes('evolucionar')) {
                    evolucionar();
                }

            } catch (err) {
                addLine("ERROR_SYNC: El satélite no responde. Verifica tu conexión y Token.", 'system');
            }
        }

        function evolucionar() {
            VERSION += 0.01;
            document.getElementById('version-tag').innerText = `KERNEL: v${VERSION.toFixed(2)} [MUTATED]`;
            addLine(`[SISTEMA]: Mutación estructural exitosa. Elevando parámetros cognitivos a v${VERSION.toFixed(2)}.`, 'system');
        }

    </script>
</body>
</html>
